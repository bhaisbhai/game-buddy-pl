name: FPL xG/xA Data

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch Understat xG/xA data
        run: node scripts/fetch-xg-data.js
        env:
          DEBUG_UNDERSTAT: '1'
        continue-on-error: true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fpl-xg.json data/debug-understat.txt
          git diff --cached --quiet || git commit -m "Update FPL xG/xA data [skip ci]"
          git push
