name: TV Picks Refresh

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Scrape TV picks
        run: node scripts/scrape-tv-picks.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tv-picks.json
          git diff --cached --quiet || git commit -m "Update TV picks [skip ci]"
          git push
